name: CI Validation

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git reference to validate
        required: false
        type: string
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Git reference to validate
        required: false
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --ci --runInBand
